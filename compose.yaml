services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro,Z
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes: ["redisdata:/data"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: { context: ./api, dockerfile: Containerfile, target: dev }
    env_file: .env
    ports: ["8080:8080"]
    volumes: ["./api/src:/app/src:ro,Z"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: { context: ./worker, dockerfile: Containerfile, target: dev }
    env_file: .env
    volumes: ["./worker/src:/app/src:ro,Z"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker.js || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: { context: ./frontend, dockerfile: Containerfile, target: dev }
    env_file: .env
    environment:
      API_BASE_URL: http://localhost:8080
    ports: ["3000:3000"]
    volumes: ["./frontend/src:/app/src:ro,Z"]
    depends_on:
      api: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
